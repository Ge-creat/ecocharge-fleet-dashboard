<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EcoCharge Fleet Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>EcoCharge Fleet Dashboard</h1>
  </header>

  <main>

    <!-- Fleet Overview -->
    <section class="card">
      <h2>Fleet Overview</h2>
      <table>
        <thead>
          <tr>
            <th>Vehicle ID</th>
            <th>Model</th>
            <th>Battery (%)</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="fleetTable"></tbody>
      </table>
    </section>

    <!-- Cost Calculator -->
    <section class="card">
      <h2>Charging Cost Calculator</h2>

      <div class="form-group">
        <label>Select Vehicle:</label>
        <select id="vehicleSelect"></select>
      </div>

      <div class="form-group">
        <label>Charging Duration (hours):</label>
        <input type="number" id="hoursInput" min="0" step="0.1" placeholder="e.g. 2.5">
      </div>

      <button id="calculateBtn">Calculate Cost</button>

      <p id="result"></p>
    </section>

  </main>

  <footer>
    <p>EcoCharge Innovations © 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
